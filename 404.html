<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - 龙兴白铁装饰</title>
    <meta name="description" content="您访问的页面不存在，请返回龙兴白铁装饰首页浏览深圳白铁工程、通风管道安装等服务信息。">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .error-page {
            min-height: 60vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 10px;
        }
        .error-title {
            font-size: 1.8rem;
            color: var(--text-color);
            margin-bottom: 15px;
        }
        .error-desc {
            font-size: 1.1rem;
            color: var(--gray-color);
            margin-bottom: 30px;
            max-width: 400px;
        }
        .error-links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .error-links a {
            padding: 10px 24px;
            border-radius: var(--border-radius);
            font-size: 0.95rem;
        }
        .error-links .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }
        .error-links .btn-secondary {
            background-color: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container">
            <div class="logo"></div>
            <ul class="nav-links">
                <li><a href="index.html">首页</a></li>
                <li><a href="index.html#about">关于我们</a></li>
                <li><a href="index.html#products">产品展示</a></li>
                <li><a href="index.html#contact">联系我们</a></li>
            </ul>
        </div>
    </div>

    <section class="error-page">
        <div>
            <div class="error-code">404</div>
            <h1 class="error-title">页面未找到</h1>
            <p class="error-desc">抱歉，您访问的页面不存在或已被移除。欢迎返回首页了解我们的白铁工程和通风管道服务。</p>
            <div class="error-links">
                <a href="index.html" class="btn-primary">返回首页</a>
                <a href="index.html#contact" class="btn-secondary">联系我们</a>
            </div>
        </div>
    </section>

    <footer class="footer">

            <div class="footer-bottom">

        </div>
